name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
      ADMIN_SECRET: ci-admin-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm --version
          node --version
          npm install -g npm@11
          npm ci

      - name: Unit tests
        run: npm test

      - name: Validate i18n
        run: npm run validate-i18n

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # Enable after GitHub secrets + repo variable ENABLE_SMOKE_CI=true (see SMOKE.md)
  smoke:
    if: vars.ENABLE_SMOKE_CI == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      ADMIN_SECRET: ${{ secrets.E2E_ADMIN_PASSWORD }}
      NEXT_PUBLIC_TENANT_SLUG: ${{ secrets.E2E_TENANT_SLUG }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_GUEST_PIN: ${{ secrets.E2E_GUEST_PIN }}
      E2E_TENANT_SLUG: ${{ secrets.E2E_TENANT_SLUG }}
      E2E_CITY_PACK_ID: sarajevo
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm install -g npm@11
          npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Apply migrations
        run: npm run db:migrate

      - name: Smoke tests
        run: npm run smoke
