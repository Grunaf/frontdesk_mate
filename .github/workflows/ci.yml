name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Validate i18n
        run: npm run validate-i18n

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # Playwright smoke needs e2e/env.local secrets — run locally: npm run smoke
  smoke:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Enable when GitHub secrets for E2E_* are configured"
